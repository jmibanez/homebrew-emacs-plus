name: Sync with upstream
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Merge upstream
        run: |
          git config user.name    "github-actions[bot]"
          git config user.email   "github-actions[bot]@users.noreply.github.com"
          git remote set-url upstream https://github.com/d12frosted/homebrew-emacs-plus.git || git remote add upstream https://github.com/d12frosted/homebrew-emacs-plus.git
          git fetch upstream
          git merge upstream/master --no-edit
      - name: Push
        run: git push origin HEAD:master
